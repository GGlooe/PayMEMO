{% extends "base.html" %}
{% block title %}Редактирование — Payment Reminder{% endblock %}

{% block content %}
<section class="card">
  <div class="section-head">
    <h1>Редактирование платежа</h1>
    <span class="section-note">{{ payment.bank_name }}</span>
  </div>

  <form method="post" class="settings-form">
    <label>Банк</label>
    <input name="bank_name" value="{{ payment.bank_name }}" required>

    <label>Сумма</label>
    <input name="amount" type="number" step="0.01" value="{{ payment.amount }}" required>

    <label>Оплачено</label>
    <input name="paid_amount" type="number" step="0.01" value="{{ payment.paid_amount }}" required>

    <label>Валюта</label>
    <input name="currency" value="{{ payment.currency }}" required>

    <label>Дата</label>
    <input name="pay_date" type="date" value="{{ payment.pay_date }}" required>

    <label>Комментарий</label>
    <textarea name="comment">{{ payment.comment }}</textarea>

    <button type="submit" class="action-btn">Сохранить</button>
  </form>
</section>
{% endblock %}
