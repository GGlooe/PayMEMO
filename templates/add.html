{% extends "base.html" %}
{% block title %}Добавить платеж — Payment Reminder{% endblock %}

{% block content %}
<section class="card">
  <div class="section-head">
    <h1>Добавить платеж</h1>
    <span class="section-note">Новая запись</span>
  </div>

  <div class="section-actions" style="margin-bottom:12px;">
    <a class="action-btn secondary" href="/import">Импорт из CSV</a>
  </div>

  <form method="post" class="settings-form">
    <label>Банк</label>
    <input name="bank_name" required placeholder="Например: Тинькофф">

    <label>Сумма</label>
    <input name="amount" type="number" step="0.01" required placeholder="0.00">

    <label>Оплачено</label>
    <input name="paid_amount" type="number" step="0.01" value="0">

    <label>Валюта</label>
    <select name="currency" style="width:100%; padding:9px 11px; border:1px solid var(--border); background:var(--surface); color:var(--text); border-radius:11px;">
      <option value="RUB" selected>₽ (RUB)</option>
      <option value="USD">$ (USD)</option>
      <option value="EUR">€ (EUR)</option>
    </select>

    <label>Дата платежа</label>
    <input name="pay_date" type="date" required>

    <label>Комментарий</label>
    <textarea name="comment" placeholder="Дополнительная информация"></textarea>

    <button type="submit" class="action-btn">Сохранить</button>
  </form>
</section>
{% endblock %}
