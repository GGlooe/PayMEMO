{% extends "base.html" %}
{% block title %}Вход — Payment Reminder{% endblock %}

{% block content %}
<section class="card" style="max-width:420px; margin:40px auto;">
  <div class="section-head">
    <h1>Вход</h1>
    <span class="section-note">Payment Reminder</span>
  </div>

  {% if error %}
    <p class="empty-state" style="color:#c0392b; margin-bottom:12px;">{{ error }}</p>
  {% endif %}

  <form method="post" class="settings-form">
    <label>Логин</label>
    <input name="username" required autocomplete="username">

    <label>Пароль</label>
    <input name="password" type="password" required autocomplete="current-password">

    <button type="submit" class="action-btn">Войти</button>
  </form>
</section>
{% endblock %}
