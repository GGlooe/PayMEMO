{% extends "base.html" %}
{% block title %}Смена пароля — Payment Reminder{% endblock %}

{% block content %}
<section class="card" style="max-width:420px; margin:40px auto;">
  <div class="section-head">
    <h1>Смена пароля</h1>
    <span class="section-note">При смене все сессии будут завершены</span>
  </div>

  {% if error %}
    <p class="empty-state" style="color:#c0392b; margin-bottom:12px;">{{ error }}</p>
  {% endif %}

  <form method="post" class="settings-form">
    <label>Текущий пароль</label>
    <input name="current_password" type="password" required>

    <label>Новый пароль</label>
    <input name="new_password" type="password" required minlength="4">

    <button type="submit" class="action-btn">Сохранить</button>
  </form>
</section>
{% endblock %}
